<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paleta de Colores</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0e11;
  --surface: #17161b;
  --border: rgba(255,255,255,0.06);
  --text: #f5f0e8;
  --text-dim: rgba(245,240,232,0.4);
  --accent: #f5f0e8;
  --transition: 0.32s cubic-bezier(0.23, 1, 0.32, 1);
}

html, body {
  width: 100%;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  cursor: none;
  overflow-x: hidden;
}

/* Custom cursor */
#cursor {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: opacity 0.2s;
  will-change: transform;
}

#cursor svg {
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  transition: transform var(--transition);
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
  z-index: 1;
  opacity: 0.6;
}

/* Ambient background glow */
#ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  transition: background var(--transition);
}

/* Layout */
.page {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 3rem 4rem 4rem;
  max-width: 1400px;
  margin: 0 auto;
}

/* Header */
header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 3rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 5rem;
  gap: 2rem;
}

.header-left {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.label {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 300;
}

h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2.8rem, 6vw, 5.5rem);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -0.03em;
  color: var(--text);
  transition: color var(--transition);
  font-style: italic;
}

h1 em {
  font-style: normal;
  -webkit-text-stroke: 1px var(--text);
  color: transparent;
  transition: -webkit-text-stroke-color var(--transition);
}

/* Color info panel */
.color-panel {
  text-align: right;
  min-width: 200px;
}

.panel-hex {
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  font-weight: 300;
  letter-spacing: 0.05em;
  color: var(--text);
  transition: color var(--transition);
  line-height: 1;
}

.panel-name {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: 6px;
  transition: color var(--transition);
}

.panel-swatch {
  width: 48px;
  height: 4px;
  border-radius: 2px;
  background: var(--text-dim);
  margin-left: auto;
  margin-top: 12px;
  transition: background var(--transition), width var(--transition);
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(160px, 100%), 1fr));
  gap: 1.5rem;
  align-content: start;
}

/* Color Card */
.card {
  position: relative;
  aspect-ratio: 1;
  border-radius: 50%;
  cursor: none;
  overflow: visible;
  transition: transform var(--transition);
}

.card-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  transition: box-shadow var(--transition), transform var(--transition);
  border: 1px solid rgba(255,255,255,0.08);
}

.card:hover .card-inner {
  transform: scale(1.06) translateY(-6px);
  box-shadow: 0 30px 60px -10px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.15);
}

/* Shine effect */
.card-inner::after {
  content: '';
  position: absolute;
  inset: 0;
  background: conic-gradient(from 135deg at 35% 35%, rgba(255,255,255,0.18) 0deg, transparent 60deg, transparent 360deg);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover .card-inner::after {
  opacity: 1;
}

/* Card label */
.card-label {
  position: absolute;
  bottom: -2rem;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity 0.25s, bottom 0.25s;
}

.card:hover .card-label {
  opacity: 1;
  bottom: -2.6rem;
}

/* Footer */
footer {
  margin-top: 6rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}

.footer-note {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.counter {
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
}

/* Stagger animation */
.card {
  opacity: 0;
  transform: translateY(20px) scale(0.95);
  animation: cardIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@media (max-width: 768px) {
  .page { padding: 2rem 1.5rem 3rem; }
  header { flex-direction: column; align-items: flex-start; margin-bottom: 3rem; }
  .color-panel { text-align: left; }
  .panel-swatch { margin-left: 0; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1rem; }
}
</style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor">
  <svg id="brushSvg" width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Brush handle -->
    <rect id="brushHandle" x="20" y="4" width="8" height="20" rx="3" fill="#e8e0d0"/>
    <rect x="22" y="4" width="2" height="20" rx="1" fill="rgba(255,255,255,0.3)"/>
    <!-- Ferrule -->
    <rect id="brushFerrule" x="19" y="22" width="10" height="6" rx="1" fill="#c8c0b0"/>
    <!-- Bristles -->
    <path id="brushBristle" d="M19 27 Q17 36 20 43 Q24 47 28 43 Q31 36 29 27 Z" fill="#f5f0e8"/>
    <path d="M22 27 Q21 34 22.5 41" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M25 27 Q25.5 35 25 42" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round" fill="none"/>
    <!-- Paint drop tip -->
    <circle id="brushDrop" cx="24" cy="44" r="2.5" fill="#f5f0e8" opacity="0.8"/>
  </svg>
</div>

<!-- Ambient glow -->
<div id="ambient"></div>

<div class="page">
  <header>
    <div class="header-left">
      <span class="label">Estudio cromático · 2025</span>
      <h1>Paleta de <em>Colores</em></h1>
    </div>
    <div class="color-panel">
      <div class="panel-hex" id="panelHex">—</div>
      <div class="panel-name" id="panelName">pasa sobre un color</div>
      <div class="panel-swatch" id="panelSwatch"></div>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <span class="footer-note">La brocha adopta el color de contraste ideal</span>
    <span class="counter" id="counter"></span>
  </footer>
</div>

<script>
const COLORS = [
  { hex: "#FF2D55", name: "Carmín" },
  { hex: "#FF6B35", name: "Naranja Fuego" },
  { hex: "#FFD166", name: "Amarillo Solar" },
  { hex: "#06D6A0", name: "Menta Jade" },
  { hex: "#118AB2", name: "Azul Océano" },
  { hex: "#7B2FBE", name: "Añil Profundo" },
  { hex: "#F72585", name: "Rosa Neón" },
  { hex: "#4CC9F0", name: "Celeste Ártico" },
  { hex: "#2EC4B6", name: "Turquesa" },
  { hex: "#E76F51", name: "Terracota" },
  { hex: "#8338EC", name: "Violeta Eléctrico" },
  { hex: "#3A86FF", name: "Zafiro" },
  { hex: "#FB5607", name: "Ámbar Vivo" },
  { hex: "#FFBE0B", name: "Oro Puro" },
  { hex: "#8AC926", name: "Lima Brillante" },
  { hex: "#6A4C93", name: "Berganot" },
  { hex: "#1982C4", name: "Cobalto" },
  { hex: "#FF595E", name: "Coral Rojo" },
  { hex: "#C77DFF", name: "Lavanda" },
  { hex: "#43AA8B", name: "Esmeralda" },
];

// Luminance-based contrast color
function getContrast(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.55 ? "#0d0c0f" : "#f8f4ee";
}

// DOM refs
const cursor = document.getElementById('cursor');
const brushBristle = document.getElementById('brushBristle');
const brushDrop = document.getElementById('brushDrop');
const brushHandle = document.getElementById('brushHandle');
const brushFerrule = document.getElementById('brushFerrule');
const ambient = document.getElementById('ambient');
const panelHex = document.getElementById('panelHex');
const panelName = document.getElementById('panelName');
const panelSwatch = document.getElementById('panelSwatch');
const h1 = document.querySelector('h1');
const h1Em = document.querySelector('h1 em');
const grid = document.getElementById('grid');
const counter = document.getElementById('counter');

let mx = -200, my = -200;
let cx = -200, cy = -200;
let raf;

// Smooth cursor follow
function animateCursor() {
  cx += (mx - cx) * 0.15;
  cy += (my - cy) * 0.15;
  cursor.style.left = cx + 'px';
  cursor.style.top = cy + 'px';
  raf = requestAnimationFrame(animateCursor);
}

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
});

animateCursor();

// Build grid
COLORS.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${i * 0.04}s`;

  const inner = document.createElement('div');
  inner.className = 'card-inner';
  inner.style.background = c.hex;

  const label = document.createElement('div');
  label.className = 'card-label';
  label.textContent = c.name;

  card.appendChild(inner);
  card.appendChild(label);
  grid.appendChild(card);

  card.addEventListener('mouseenter', () => {
    const contrast = getContrast(c.hex);
    
    // Update brush color
    brushBristle.setAttribute('fill', contrast);
    brushDrop.setAttribute('fill', contrast);
    brushHandle.setAttribute('fill', c.hex === '#0d0c0f' ? '#555' : c.hex);
    brushFerrule.setAttribute('fill', contrast + 'aa');
    
    // Scale up brush
    cursor.querySelector('svg').style.transform = 'scale(1.2) rotate(-10deg)';
    
    // Update panel
    panelHex.textContent = c.hex.toUpperCase();
    panelHex.style.color = c.hex;
    panelName.textContent = c.name;
    panelName.style.color = c.hex;
    panelSwatch.style.background = c.hex;
    panelSwatch.style.width = '80px';
    
    // Ambient glow
    ambient.style.background = `radial-gradient(ellipse at 70% 40%, ${c.hex}22 0%, transparent 65%)`;
    
    // Title color echo
    h1.style.color = c.hex === '#0d0c0f' ? 'var(--text)' : '#f5f0e8';
    h1Em.style.webkitTextStrokeColor = c.hex;
  });

  card.addEventListener('mouseleave', () => {
    cursor.querySelector('svg').style.transform = 'scale(1) rotate(0deg)';
    resetToDefault();
  });
});

function resetToDefault() {
  brushBristle.setAttribute('fill', '#f5f0e8');
  brushDrop.setAttribute('fill', '#f5f0e8');
  brushHandle.setAttribute('fill', '#e8e0d0');
  brushFerrule.setAttribute('fill', '#c8c0b0');
  panelHex.textContent = '—';
  panelHex.style.color = 'var(--text)';
  panelName.textContent = 'pasa sobre un color';
  panelName.style.color = 'var(--text-dim)';
  panelSwatch.style.background = 'var(--text-dim)';
  panelSwatch.style.width = '48px';
  ambient.style.background = 'none';
  h1.style.color = 'var(--text)';
  h1Em.style.webkitTextStrokeColor = 'var(--text)';
}

counter.textContent = `${COLORS.length} colores`;

// Hide default cursor everywhere
document.body.style.cursor = 'none';
</script>
</body>
</html>
